version: "3.9"

services:
  falkordb:
    image: falkordb/falkordb:latest
    container_name: agentcompany-falkordb
    ports:
      - "6379:6379"   # Redis / FalkorDB port
      - "3000:3000"   # FalkorDB Browser UI (open http://localhost:3000)
    volumes:
      - falkordb_data:/data
    restart: unless-stopped
    environment:
      - FALKORDB_ARGS=--save 60 1 --appendonly yes

volumes:
  falkordb_data:
    name: agentcompany_falkordb_data
